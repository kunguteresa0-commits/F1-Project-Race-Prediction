services:
  f1-app:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://f1user:f1password@db:5432/f1db
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
      POSTGRES_DB: f1db
    ports:
      - "5434:5432"  # Host Port 5434 -> Container Port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: